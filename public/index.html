<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Status Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Task Status Tracker</h1>

    <div class="container">
        <input id="taskInput" type="text" placeholder="Enter task title">
        <button onclick="addTask()">Add Task</button>
    </div>

    <div class="board">
        <div class="column">
            <h2>To-Do</h2>
            <ul id="todoList"></ul>
        </div>

        <div class="column">
            <h2>Doing</h2>
            <ul id="doingList"></ul>
        </div>

        <div class="column">
            <h2>Done</h2>
            <ul id="doneList"></ul>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
